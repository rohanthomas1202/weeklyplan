spring:
  datasource:
    url: jdbc:postgresql://localhost:5434/weeklyplanning
    username: wp_user
    password: wp_pass
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080
